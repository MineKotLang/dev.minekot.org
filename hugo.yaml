# $schema: ./schemas/hugo.json

baseURL: https://dev.minekot.org/
locale: en-us
title: "MineKot Dev Docs"
enableGitInfo: true

# noinspection SpellCheckingInspection
params:
  linkTitle: "MineKot Dev Docs"
  logo:
    src: "/images/minekot-flat.svg"
  disableLandingPageButton: true
  author:
    name: "MineKot Team"
  themeVariant:
    - identifier: catppuccin-auto
      name: "Catppuccin Latte/Mocha"
      auto: [ ]
    - identifier: catppuccin-latte
      name: "Catppuccin Latte"
    - identifier: catppuccin-mocha
      name: "Catppuccin Mocha"

  collapsibleMenu: true

  hideAuthorEmail: true

  titleSeparator: " - "
  breadcrumbSeparator: "/"
  disableRootBreadcrumb: true
  disableTermBreadcrumbs: true
  disableInlineCopyToClipBoard: true


  # Header menu
  sidebarheadermenus:
    - type: divider
    - disableTitle: true
      identifier: homelinks
      type: menu
    - type: divider
    - identifier: home
      type: menu
      main: true
      disableTitle: true
    - elements:
        - type: versionswitcher
      identifier: headercontrols
      type: custom
    - type: divider

  # Page list
  sidebarmenus:
    - identifier: main
      type: page
    - disableTitle: false
      identifier: shortcuts
      type: menu

  # Footer menu
  sidebarfootermenus:
    - type: divider
    - elements:
        - type: historyclearer
        - type: variantswitcher
        - type: languageswitcher
      identifier: footercontrols
      type: custom

menus:
  home:
    - identifier: home
      weight: 1
      url: "/"
      name: "<div class=\"minekot-docs-home-link\" style=\"text-align: center;\" ><i class=\"fa-fw fas fa-home\"></i> Home</div>"

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true

  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineAnchors: ''
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    tabWidth: 4
    wrapperClass: highlight

module:
  imports:
    - path: github.com/McShelby/hugo-theme-relearn
