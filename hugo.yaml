# $schema: https://json.schemastore.org/hugo.json
baseURL: https://dev.minekot.org/
locale: en-us
title: MineKot Developer Docs

enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineAnchors: ''
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    style: catppuccin-mocha
    tabWidth: 4
    wrapperClass: highlight

menu:
  main:
    - name: Architecture
      pageRef: /architecture
      weight: 10
    - name: Codestyle
      pageRef: /codestyles
      weight: 20
    - name: Tooling
      pageRef: /tooling
      weight: 30
    - name: Search
      weight: 40
      params:
        type: search
    - name: GitHub
      weight: 50
      url: "https://github.com/MineKotLang/"
      params:
        icon: github
    - name: Theme Toggle
      weight: 100
      params:
        type: theme-toggle

  sidebar:
    - name: Resources
      params:
        type: separator
      weight: 1
    - name: "Hugo Docs ↗"
      url: "https://gohugo.io/documentation/"
      weight: 2

params:
  description: "Developer documentation, and Codestyle, for MineKot."
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  displayUpdatedAuthor: true
  theme:
    default: system
    displayToggle: false
  editURL:
    enable: true
    base: "https://github.com/minekot/dev.minekot.org/edit/master"
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo-flat.svg
      dark: images/logo-flat.svg
      link: /
      width: 40
      height: 20
  page:
    displayPagination: true
    contextMenu:
      enable: true
  blog:
    article:
      displayPagination: true
